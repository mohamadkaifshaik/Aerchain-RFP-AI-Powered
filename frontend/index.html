<!doctype html>
<html>
<head><meta charset="utf-8"><title>RFP Mail Demo</title></head>
<body style="font-family:Arial,Helvetica,sans-serif;margin:24px;">
  <h2>RFP Mail Demo</h2>
  <div style="border:1px solid #ddd;padding:12px;border-radius:6px;margin-bottom:12px;">
    <h3>Create RFP</h3>
    <input id="title" placeholder="Title" style="width:100%;padding:8px;margin:6px 0"/><br/>
    <textarea id="desc" placeholder="Description" style="width:100%;height:100px"></textarea><br/>
    <button onclick="createRFP()">Create</button>
    <pre id="rfpOut"></pre>
  </div>

  <div style="border:1px solid #ddd;padding:12px;border-radius:6px;margin-bottom:12px;">
    <h3>Add Vendor</h3>
    <input id="vname" placeholder="Vendor name" style="width:48%;padding:6px"/><input id="vemail" placeholder="Vendor email" style="width:48%;padding:6px"/><br/>
    <button onclick="addVendor()">Add Vendor</button>
    <div id="vendors"></div>
  </div>

  <div style="border:1px solid #ddd;padding:12px;border-radius:6px;">
    <h3>RFPs</h3>
    <button onclick="loadRFPs()">Refresh</button>
    <div id="rfps"></div>
  </div>

<script>
const api = 'http://localhost:8000';

async function createRFP(){
  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const res = await fetch(api + '/api/rfps', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title:title, description:desc})});
  const data = await res.json();
  document.getElementById('rfpOut').textContent = JSON.stringify(data, null, 2);
  loadRFPs();
}

async function addVendor(){
  const name = document.getElementById('vname').value;
  const email = document.getElementById('vemail').value;
  await fetch(api + '/api/vendors', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:name, primary_email:email})});
  loadVendors();
}

async function loadVendors(){
  const res = await fetch(api + '/api/vendors');
  const data = await res.json();
  document.getElementById('vendors').innerHTML = data.map(v => `<div>${v.name} &lt;${v.primary_email}&gt;</div>`).join('');
}

async function loadRFPs(){
  const res = await fetch(api + '/api/rfps');
  const data = await res.json();
  document.getElementById('rfps').innerHTML = data.map(r => {
    return `<div style="border:1px solid #eee;padding:8px;margin:6px 0">
      <b>${r.title}</b><div>${r.description}</div>
      <button onclick="sendRFP('${r.id}')">Send to all vendors</button>
    </div>`;
  }).join('');
}

async function sendRFP(rid){
  const vendors = await fetch(api + '/api/vendors').then(r=>r.json());
  const ids = vendors.map(v=>v.id);
  const res = await fetch(api + '/api/rfps/' + rid + '/send', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(ids)});
  const data = await res.json();
  alert('Send results: ' + JSON.stringify(data));
}

loadVendors();
loadRFPs();
</script>
</body>
</html>
